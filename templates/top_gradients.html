<!DOCTYPE html>
<html>
<head>

<title>Top 100 CSS Gradients – Free Gradient Backgrounds</title>

<meta name="description"
content="Discover the top 100 CSS gradients. Copy beautiful gradient backgrounds for free.">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

.gradient-box{
height:120px;
border-radius:10px;
transition: transform .2s;
}

.gradient-box:hover{
transform: scale(1.05);
}

</style>

</head>

<body class="container py-5">

<h1 class="mb-4">Top 100 CSS Gradients</h1>

<p class="mb-5">
Browse the most beautiful CSS gradient backgrounds. Click any gradient to copy the CSS code.
</p>

<div class="row">

{% for g in gradients %}

<div class="col-md-3 mb-4">

<a href="/gradient/{{ g.slug }}" style="text-decoration:none">

<div class="gradient-box"

style="
{% if g.gradient_type == 'linear' %}
background: linear-gradient({{g.angle}}deg, {{ g.colors|join(',') }});
{% else %}
background: radial-gradient(circle, {{ g.colors|join(',') }});
{% endif %}
">
</div>

<p class="mt-2 text-dark">{{ g.name }}</p>

</a>

</div>

{% endfor %}

</div>

</body>
</html>
