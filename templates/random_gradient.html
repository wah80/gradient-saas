<!DOCTYPE html>
<html>
<head>

<title>Random Gradient Generator</title>

<meta name="description"
content="Generate random CSS gradients instantly. Copy the gradient CSS code for free.">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<style>

#gradientBox{
height:350px;
border-radius:12px;
transition:background .4s ease;
}

</style>

</head>

<body class="container py-5">

<h1 class="mb-4">Random Gradient Generator</h1>

<div id="gradientBox"></div>

<pre class="mt-3" id="cssCode"></pre>


<button class="btn btn-primary mt-2" onclick="generateRandomGradient()">
🎲 Generate Random Gradient
</button>

<button class="btn btn-secondary mt-2" onclick="copyCSS()">
Copy CSS
</button>
<a href="/dashboard" class="btn btn-primary mt-2">Back To Dashboard</a>
<br><br>
<a href="/gradients/blue">Blue Gradients</a>
<a href="/gradients/pink">Pink Gradients</a>
<a href="/gradients/dark">Dark Gradients</a>
<a href="/gradients/vibrant">Vibrant Gradients</a>

<script>

function randomColor(){
    return "#" + Math.floor(Math.random()*16777215).toString(16).padStart(6,"0");
}

function generateRandomGradient(){

    let color1 = randomColor();
    let color2 = randomColor();
    let angle = Math.floor(Math.random()*360);

    let gradient = `linear-gradient(${angle}deg, ${color1}, ${color2})`;

    document.getElementById("gradientBox").style.background = gradient;

    document.getElementById("cssCode").innerText =
        `background: ${gradient};`;
}

function copyCSS(){

    let text = document.getElementById("cssCode").innerText;

    navigator.clipboard.writeText(text);

    alert("CSS Copied!");
}

generateRandomGradient();

</script>

</body>
</html>
